<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LandLedger — Mobile UI Kit</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--ll-paper-200); overflow: hidden; }
  body {
    background-image: url("../../assets/pattern-contour.svg");
    background-repeat: repeat;
  }
  #stage { width: 100vw; height: 100vh; display: grid; place-items: center; }
  .role-bar {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--ll-soil-900); color: #fff; border-radius: 999px;
    padding: 4px; display: flex; gap: 2px; box-shadow: var(--ll-shadow-2); z-index: 100;
  }
  .role-bar button {
    border: none; background: transparent; color: #fff; opacity: 0.6;
    padding: 7px 16px; border-radius: 999px; font-family: inherit; font-weight: 600; font-size: 13px; cursor: pointer;
    transition: all 180ms;
  }
  .role-bar button.active { background: var(--ll-terracotta-500); opacity: 1; }
  .screen-root { display: flex; flex-direction: column; height: 100%; background: var(--ll-bg); position: relative; }
</style>
</head>
<body>
  <div class="role-bar">
    <button id="r-admin" class="active">Admin</button>
    <button id="r-buyer">Buyer</button>
  </div>
  <div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="LLPrimitives.jsx"></script>
<script type="text/babel" src="LLAppShell.jsx"></script>
<script type="text/babel" src="AdminScreens.jsx"></script>
<script type="text/babel" src="BuyerScreens.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function AdminApp() {
  const [tab, setTab] = useState("home");
  const [project, setProject] = useState(null);
  const [plot, setPlot] = useState(null);
  const [paymentOpen, setPaymentOpen] = useState(false);

  let content;
  if (plot)         content = <AdminPlotDetail plot={plot} onBack={() => setPlot(null)} onRecordPayment={() => setPaymentOpen(true)} />;
  else if (project) content = <AdminProjectDetail project={project} onBack={() => setProject(null)} onOpenPlot={setPlot} />;
  else if (tab === "home")    content = <AdminHome onOpenProject={setProject} onRecordPayment={() => setPaymentOpen(true)} />;
  else if (tab === "projects") content = (
    <>
      <AppBar title="Projects" />
      <Scroll>
        {LL_DATA.projects.map(p => (
          <Card key={p.id} onClick={() => setProject(p)} style={{ marginBottom: 10 }}>
            <div style={{ fontWeight: 600 }}>{p.name}</div>
            <div style={{ fontSize: 12, color: "var(--ll-fg-muted)" }}>{p.location} · {p.plots} plots</div>
          </Card>
        ))}
      </Scroll>
    </>
  );
  else if (tab === "payments") content = (
    <>
      <AppBar title="Payments" />
      <Scroll>
        <Card padded={false} style={{ padding: "4px 16px" }}>
          {LL_DATA.transactions.map(t => (
            <ListRow key={t.id}
              icon={t.mode === "UPI" ? "upi" : t.mode === "Cash" ? "cash" : "bank"}
              title={formatINR(t.amount)}
              subtitle={`${t.date} · ${t.buyer} · Plot ${t.plot}`}
              rightChip={<span style={{ fontFamily: "var(--ll-font-mono)", fontSize: 10, color: "var(--ll-fg-subtle)" }}>{t.id}</span>} />
          ))}
        </Card>
      </Scroll>
    </>
  );
  else if (tab === "reports") content = (
    <>
      <AppBar title="Reports" />
      <Scroll>
        <Card style={{ padding: 20, textAlign: "center" }}>
          <img src="../../assets/illustration-empty.svg" style={{ width: 180, margin: "0 auto 12px", display: "block" }} />
          <div style={{ fontWeight: 600, marginBottom: 4 }}>Reports coming soon</div>
          <div style={{ fontSize: 12, color: "var(--ll-fg-muted)" }}>Monthly P&amp;L and project-wise summaries will land here in Phase 1.</div>
        </Card>
      </Scroll>
    </>
  );
  else content = <AdminHome onOpenProject={setProject} onRecordPayment={() => setPaymentOpen(true)} />;

  return (
    <div className="screen-root">
      {content}
      {!project && !plot && (
        <TabBar active={tab} onChange={setTab} tabs={[
          { id: "home", icon: "home", label: "Home" },
          { id: "projects", icon: "map", label: "Projects" },
          { id: "payments", icon: "wallet", label: "Payments" },
          { id: "reports", icon: "report", label: "Reports" },
        ]} />
      )}
      <RecordPaymentSheet open={paymentOpen} onClose={() => setPaymentOpen(false)} onDone={() => setPaymentOpen(false)} />
    </div>
  );
}

function BuyerApp() {
  const [tab, setTab] = useState("home");
  const [view, setView] = useState(null); // "emi" | "history"

  let content;
  if (view === "emi")          content = <BuyerEMISchedule onBack={() => setView(null)} />;
  else if (view === "history") content = <BuyerHistory onBack={() => setView(null)} />;
  else if (tab === "home")     content = <BuyerHome onOpenPlot={() => setView("emi")} onEMI={() => setView("emi")} />;
  else if (tab === "plots")    content = (
    <>
      <AppBar title="My plots" />
      <Scroll>
        {LL_DATA.buyerPlots.map(p => (
          <Card key={p.plotId} style={{ marginBottom: 10 }} onClick={() => setView("emi")}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontWeight: 700 }}>Plot {p.num}</div>
                <div style={{ fontSize: 12, color: "var(--ll-fg-muted)" }}>{p.project} · {p.area.toLocaleString("en-IN")} sq.ft</div>
              </div>
              <Amount value={p.total} size="md" />
            </div>
          </Card>
        ))}
      </Scroll>
    </>
  );
  else if (tab === "history") content = <BuyerHistory onBack={() => setTab("home")} />;
  else if (tab === "profile") content = (
    <>
      <AppBar title="Profile" />
      <Scroll>
        <Card style={{ marginBottom: 10, padding: 20, textAlign: "center" }}>
          <div style={{ width: 60, height: 60, borderRadius: 999, background: "var(--ll-terracotta-500)", color: "#fff", fontWeight: 700, fontSize: 22, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 10px" }}>RP</div>
          <div style={{ fontWeight: 700, fontSize: 16 }}>Rohan Patil</div>
          <div style={{ fontSize: 12, color: "var(--ll-fg-muted)" }}>rohan.patil@gmail.com · +91 98765 43210</div>
        </Card>
        <Card padded={false} style={{ padding: "4px 16px" }}>
          <ListRow icon="doc"   title="KYC documents" onClick={() => {}} />
          <ListRow icon="bell"  title="Reminders"     subtitle="7-day, day-of, overdue" onClick={() => {}} />
          <ListRow icon="phone" title="Support"       onClick={() => {}} />
          <ListRow icon="lock"  title="Sign out"      onClick={() => {}} />
        </Card>
      </Scroll>
    </>
  );

  return (
    <div className="screen-root">
      {content}
      {!view && (
        <TabBar active={tab} onChange={setTab} tabs={[
          { id: "home", icon: "home", label: "Home" },
          { id: "plots", icon: "map", label: "Plots" },
          { id: "history", icon: "wallet", label: "History" },
          { id: "profile", icon: "user", label: "Profile" },
        ]} />
      )}
    </div>
  );
}

function Root() {
  const [role, setRole] = useState("admin");
  useEffect(() => {
    const a = document.getElementById("r-admin");
    const b = document.getElementById("r-buyer");
    a.onclick = () => { setRole("admin"); a.classList.add("active"); b.classList.remove("active"); };
    b.onclick = () => { setRole("buyer"); b.classList.add("active"); a.classList.remove("active"); };
  }, []);
  return (
    <IOSFrame key={role} variant="light" showKeyboard={false}>
      {role === "admin" ? <AdminApp /> : <BuyerApp />}
    </IOSFrame>
  );
}

ReactDOM.createRoot(document.getElementById("stage")).render(<Root />);
</script>
</body>
</html>
