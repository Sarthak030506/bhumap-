<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--ll-bg);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{border-radius:10px;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;box-shadow:var(--ll-shadow-1);}
  .sw .name{font-size:11px;font-weight:600;opacity:.9;}
  .sw .hex{font-family:var(--ll-font-mono);font-size:11px;opacity:.8;}
  .dark{color:#fff;} .light{color:var(--ll-soil-900);}
  h4{margin:0 0 10px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ll-fg-muted);font-weight:600;}
</style></head><body>
  <h4>Evergreen · Primary brand</h4>
  <div class="row">
    <div class="sw light" style="background:var(--ll-evergreen-50)"><span class="name">evergreen-50</span><span class="hex">#E8F1EC</span></div>
    <div class="sw light" style="background:var(--ll-evergreen-100)"><span class="name">evergreen-100</span><span class="hex">#C9E0D1</span></div>
    <div class="sw dark" style="background:var(--ll-evergreen-300)"><span class="name">evergreen-300</span><span class="hex">#6FB28F</span></div>
    <div class="sw dark" style="background:var(--ll-evergreen-500)"><span class="name">evergreen-500</span><span class="hex">#2B8A61</span></div>
    <div class="sw dark" style="background:var(--ll-evergreen-600);outline:2px solid var(--ll-soil-900);outline-offset:-2px"><span class="name">evergreen-600 ★</span><span class="hex">#1F6F50</span></div>
    <div class="sw dark" style="background:var(--ll-evergreen-700)"><span class="name">evergreen-700</span><span class="hex">#185A40</span></div>
    <div class="sw dark" style="background:var(--ll-evergreen-900)"><span class="name">evergreen-900</span><span class="hex">#0D3A29</span></div>
    <div class="sw light" style="background:var(--ll-paper-50);border:1px solid var(--ll-border)"><span class="name">paper-50 · bg</span><span class="hex">#FBF7F0</span></div>
  </div>
</body></html>
