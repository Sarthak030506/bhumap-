<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--ll-bg);display:flex;flex-direction:column;gap:14px;}
  .bar{background:var(--ll-surface);border-radius:14px;box-shadow:var(--ll-shadow-2);display:grid;grid-template-columns:repeat(4,1fr);padding:8px;border:1px solid var(--ll-border);}
  .i{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:10px;color:var(--ll-fg-muted);font-size:11px;font-weight:600;cursor:pointer;}
  .i.active{color:var(--ll-primary);background:var(--ll-primary-soft);}
  .i svg{width:22px;height:22px;stroke-width:1.75;}
  .appbar{background:var(--ll-surface);border:1px solid var(--ll-border);border-radius:12px;display:flex;align-items:center;gap:12px;padding:12px 14px;}
  .appbar .ttl{font-weight:700;font-size:16px;color:var(--ll-fg);flex:1;}
  .appbar button{width:36px;height:36px;border-radius:10px;border:none;background:var(--ll-paper-100);color:var(--ll-fg);display:flex;align-items:center;justify-content:center;}
  .appbar button svg{width:18px;height:18px;stroke-width:2;}
</style></head><body>
  <div class="appbar">
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="ttl">Plot A-14</div>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>
  </div>
  <div class="bar">
    <div class="i active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      Home
    </div>
    <div class="i">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M3 12h18"/><path d="M3 18h18"/></svg>
      Projects
    </div>
    <div class="i">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
      Payments
    </div>
    <div class="i">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg>
      Profile
    </div>
  </div>
</body></html>
