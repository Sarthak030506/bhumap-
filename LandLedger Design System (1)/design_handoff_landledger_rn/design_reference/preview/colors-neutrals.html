<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--ll-bg);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{border-radius:10px;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-shadow:var(--ll-shadow-1);}
  .sw .name{font-size:11px;font-weight:600;opacity:.9;}
  .sw .hex{font-family:var(--ll-font-mono);font-size:11px;opacity:.8;}
  .dark{color:#fff;} .light{color:var(--ll-soil-900);}
  h4{margin:0 0 10px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ll-fg-muted);font-weight:600;}
  h4+div+h4{margin-top:18px;}
</style></head><body>
  <h4>Soil · Text & dark surfaces</h4>
  <div class="row">
    <div class="sw light" style="background:var(--ll-soil-100)"><span class="name">soil-100</span><span class="hex">#E7DDCB</span></div>
    <div class="sw light" style="background:var(--ll-soil-300)"><span class="name">soil-300</span><span class="hex">#B49F7F</span></div>
    <div class="sw dark" style="background:var(--ll-soil-500)"><span class="name">soil-500</span><span class="hex">#6B553C</span></div>
    <div class="sw dark" style="background:var(--ll-soil-700)"><span class="name">soil-700</span><span class="hex">#3F2F1E</span></div>
  </div>
  <h4>Paper · Canvas</h4>
  <div class="row">
    <div class="sw light" style="background:var(--ll-paper-50);border:1px solid var(--ll-border)"><span class="name">paper-50</span><span class="hex">#FBF7F0</span></div>
    <div class="sw light" style="background:var(--ll-paper-100)"><span class="name">paper-100</span><span class="hex">#F5EFE3</span></div>
    <div class="sw light" style="background:var(--ll-paper-200)"><span class="name">paper-200</span><span class="hex">#EDE4D1</span></div>
    <div class="sw light" style="background:var(--ll-line)"><span class="name">line</span><span class="hex">#E9E1D3</span></div>
  </div>
</body></html>
