<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--ll-bg);display:flex;flex-direction:column;gap:12px;}
  .card{background:var(--ll-surface);border:1px solid var(--ll-border);border-radius:12px;padding:14px;box-shadow:var(--ll-shadow-1);display:flex;gap:12px;align-items:center;}
  .thumb{width:52px;height:52px;border-radius:10px;background:var(--ll-paper-100);display:flex;align-items:center;justify-content:center;font-family:var(--ll-font-mono);font-weight:700;color:var(--ll-soil-500);font-size:14px;border:1px solid var(--ll-border);position:relative;}
  .thumb .dot{position:absolute;top:-3px;right:-3px;width:12px;height:12px;border-radius:999px;border:2px solid var(--ll-surface);}
  .body{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
  .t{font-weight:600;font-size:15px;color:var(--ll-fg);}
  .s{font-size:12px;color:var(--ll-fg-muted);display:flex;gap:6px;align-items:center;}
  .amt{font-family:var(--ll-font-sans);font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;color:var(--ll-fg);}
  .right{text-align:right;display:flex;flex-direction:column;gap:3px;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600;align-self:flex-end;}
  .chip::before{content:"";width:5px;height:5px;border-radius:999px;background:currentColor;}
  .avail{background:var(--ll-status-available-bg);color:var(--ll-status-available-fg);}
  .resv{background:var(--ll-status-reserved-bg);color:var(--ll-status-reserved-fg);}
  .sold{background:var(--ll-status-sold-bg);color:var(--ll-status-sold-fg);}
</style></head><body>
  <div class="card">
    <div class="thumb">A-14<span class="dot" style="background:var(--ll-status-available)"></span></div>
    <div class="body"><div class="t">Plot A-14</div><div class="s">2,400 sq.ft · Green Valley Phase 1</div></div>
    <div class="right"><span class="amt">₹18,00,000</span><span class="chip avail">Available</span></div>
  </div>
  <div class="card">
    <div class="thumb">B-02<span class="dot" style="background:var(--ll-status-reserved)"></span></div>
    <div class="body"><div class="t">Plot B-02</div><div class="s">1,800 sq.ft · Reserved for Meera S.</div></div>
    <div class="right"><span class="amt">₹13,50,000</span><span class="chip resv">Reserved</span></div>
  </div>
  <div class="card">
    <div class="thumb">C-07<span class="dot" style="background:var(--ll-status-sold)"></span></div>
    <div class="body"><div class="t">Plot C-07</div><div class="s">2,100 sq.ft · Sold to Rohan Patil</div></div>
    <div class="right"><span class="amt">₹15,75,000</span><span class="chip sold">Sold</span></div>
  </div>
</body></html>
