<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--ll-bg);display:flex;gap:20px;align-items:center;}
  .logos{display:flex;flex-direction:column;gap:14px;flex:1;}
  .logos img{display:block;}
  .dark{background:var(--ll-soil-900);padding:10px 14px;border-radius:8px;}
  .mark{display:flex;align-items:center;gap:14px;}
  .mark img{width:56px;height:56px;}
</style></head><body>
  <div class="logos">
    <img src="../assets/logo-wordmark.svg" alt="LandLedger" height="44">
    <div class="dark"><img src="../assets/logo-wordmark-dark.svg" alt="LandLedger on dark" height="36"></div>
  </div>
  <div class="mark">
    <img src="../assets/logo-mark.svg" alt="mark">
    <div style="display:flex;flex-direction:column;gap:2px;">
      <span class="ll-body-strong">Mark</span>
      <span class="ll-caption">Surveyed plot · 1 corner highlighted</span>
    </div>
  </div>
</body></html>
