<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--ll-bg);display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .box{height:90px;background:var(--ll-surface);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:var(--ll-fg);}
  .lbl{font-family:var(--ll-font-mono);font-size:11px;color:var(--ll-fg-muted);margin-top:8px;display:block;line-height:1.5;}
  .s1{box-shadow:var(--ll-shadow-1);}
  .s2{box-shadow:var(--ll-shadow-2);}
  .s3{box-shadow:var(--ll-shadow-3);}
  .cell{display:flex;flex-direction:column;}
</style></head><body>
  <div class="cell"><div class="box s1">shadow-1 · card</div><span class="lbl">0 1px 2px rgba(42,31,20,.06)</span></div>
  <div class="cell"><div class="box s2">shadow-2 · sheet</div><span class="lbl">0 8px 24px -8px rgba(42,31,20,.18)</span></div>
  <div class="cell"><div class="box s3">shadow-3 · modal</div><span class="lbl">0 20px 48px -16px rgba(42,31,20,.28)</span></div>
</body></html>
