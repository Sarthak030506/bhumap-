<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--ll-bg);display:grid;grid-template-columns:1fr 1fr;gap:0;height:300px;}
  .a,.b{display:flex;flex-direction:column;justify-content:flex-end;padding:24px;position:relative;overflow:hidden;}
  .a{background:var(--ll-paper-50);}
  .a::before{content:"";position:absolute;inset:0;background-image:url("../assets/pattern-contour.svg");opacity:1;}
  .b{background:var(--ll-soil-900);color:var(--ll-fg-on-dark);}
  .b::before{content:"";position:absolute;inset:0;background-image:url("../assets/pattern-contour.svg");filter:invert(1) brightness(1.4);opacity:.35;}
  .lbl{position:relative;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;opacity:.7;}
  .ttl{position:relative;font-weight:700;font-size:24px;line-height:1.2;margin-top:4px;letter-spacing:-.01em;}
  .a .ttl{color:var(--ll-soil-900);}
</style></head><body>
  <div class="a"><span class="lbl">Empty state · paper</span><span class="ttl">Record the first plot sale to get started</span></div>
  <div class="b"><span class="lbl" style="color:var(--ll-terracotta-300)">Splash · dark</span><span class="ttl">The ledger for your land business.</span></div>
</body></html>
